<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 276 186" fill="none">
  <defs>
    <linearGradient id="bg" x1="32" y1="10" x2="244" y2="186" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#A8C3DD"/>
      <stop offset="0.54" stop-color="#7FA5C8"/>
      <stop offset="1" stop-color="#5E84AC"/>
    </linearGradient>
    <linearGradient id="shine" x1="138" y1="0" x2="138" y2="116" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FFFFFF" stop-opacity=".18"/>
      <stop offset=".42" stop-color="#FFFFFF" stop-opacity=".05"/>
      <stop offset="1" stop-color="#FFFFFF" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="panel" x1="137" y1="33" x2="137" y2="133" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#F5FAFF" stop-opacity=".24"/>
      <stop offset=".58" stop-color="#EAF4FC" stop-opacity=".14"/>
      <stop offset="1" stop-color="#EAF4FC" stop-opacity=".1"/>
    </linearGradient>
    <filter id="panelShadow" x="22" y="16" width="230" height="138" filterUnits="userSpaceOnUse">
      <feDropShadow dx="0" dy="8" stdDeviation="8" flood-color="#456A90" flood-opacity=".16"/>
    </filter>
    <filter id="grain" x="-20%" y="-20%" width="140%" height="140%">
      <feTurbulence type="fractalNoise" baseFrequency="1.15" numOctaves="2" seed="5" stitchTiles="stitch"/>
      <feColorMatrix type="saturate" values="0"/>
      <feComponentTransfer>
        <feFuncA type="table" tableValues="0 0 .05 .08"/>
      </feComponentTransfer>
    </filter>
  </defs>

  <rect width="276" height="186" fill="url(#bg)"/>
  <rect width="276" height="186" fill="url(#shine)"/>

  <rect x="13" y="0" width="18" height="186" fill="#3F6286" opacity=".08"/>
  <rect x="18" y="0" width="1" height="186" fill="#F4FAFF" opacity=".22"/>
  <rect x="22" y="0" width="1" height="186" fill="#F4FAFF" opacity=".16"/>
  <rect x="26" y="0" width="1" height="186" fill="#F4FAFF" opacity=".1"/>

  <g filter="url(#panelShadow)">
    <rect x="44" y="33" width="186" height="96" rx="16" fill="url(#panel)" stroke="#F3FAFF" stroke-opacity=".18"/>
    <path d="M44 86.5H230" stroke="#F3FAFF" stroke-opacity=".14"/>
  </g>

  <rect x="40" y="138" width="42" height="2.4" rx="1.2" fill="#F3FAFF" fill-opacity=".72"/>
  <rect width="276" height="186" filter="url(#grain)" opacity=".22"/>
</svg>
