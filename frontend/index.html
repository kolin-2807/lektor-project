<!DOCTYPE html>
<html lang="kk">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Satbayev Edu Assistant</title>
  <link rel="stylesheet" href="./css/style.css" />
</head>
<body>
  <div class="app">
    <header class="topbar">
      <div class="topbar-inner">
        <div class="brand">
          <div class="brand-logo">
            <img src="./assets/images/lektor_logo.png" alt="Lektor logo" />
          </div>

          <div class="brand-text">
            <button class="role-title-btn" id="roleTitleBtn" type="button">
              <span id="brandRoleTitle">Оқытушы</span>
              <span class="role-title-arrow">▾</span>
            </button>

            <div class="role-menu hidden" id="roleMenu">
              <button class="role-menu-item active" data-role-value="kaz" type="button">Оқытушы</button>
              <button class="role-menu-item" data-role-value="rus" type="button">Лектор</button>
            </div>
          </div>
        </div>

        <div class="topbar-right">
          <button class="profile-avatar-btn" id="profileBtn" type="button" aria-label="profile">
            <div class="avatar" id="topAvatar">КЕ</div>
          </button>

          <div class="profile-dropdown" id="profileDropdown">
            <div class="profile-card-top">
              <div class="avatar" id="dropdownAvatar" style="width:52px;height:52px;font-size:16px;">КЕ</div>
              <div class="profile-main">
                <strong id="dropdownName">Каламан Ерболат Тлеуханұлы</strong>
                <span id="dropdownRole">ст.преподаватель</span>
                <span id="dropdownEmail">kalaman@university.kz</span>
              </div>
            </div>

            <div class="profile-actions">
              <button id="editProfileBtn" type="button">Профильді өңдеу</button>
              <button id="logoutBtn" type="button">Шығу</button>
            </div>
          </div>
        </div>
      </div>
    </header>

    <main class="page">
      <section id="homeView">
        <div class="home-stage" id="courseStage">
          <div class="section-title-wrap"></div>
          <section class="course-grid" id="courseGrid"></section>
        </div>

        <div class="home-stage hidden" id="disciplineStage">
          <div class="section-head-inline section-head-inline-compact">
            <button class="back-chip-btn" id="courseBackBtn" type="button">← Артқа</button>
          </div>

          <section class="cards-grid" id="cardsGrid"></section>
        </div>
      </section>

      <section id="subjectView" class="hidden">
        <section class="subject-shell">

          <!-- ЖОҒАРЫҒА КӨТЕРІЛГЕН SUBJECT HEADER -->
          <div class="subject-cover-top" id="subjectCoverTop">
            <button class="cover-back-btn" id="backBtn" type="button">← Артқа</button>

            <div class="subject-cover-copy">
              <h2 id="subjectTitle">Желілік қауіпсіздік</h2>
              <p id="subjectCourse">3 курс</p>
            </div>

            <div class="subject-cover-edit">
              <button class="cover-btn" id="changeCoverBtn" type="button">Өңдеу</button>
              <input class="hidden-file" id="coverFileInput" type="file" accept="image/*" />
            </div>
          </div>

          <!-- ЖАҢА БАСҚАРУ ПАНЕЛІ -->
          <div class="subject-control-panel" id="subjectControlPanel">
            <div class="control-select-card">
              <label for="materialTypeSelect">Материал түрі</label>
              <select id="materialTypeSelect">
                <option value="lecture">Дәріс</option>
                <option value="lab">Зертхана</option>
                <option value="practice">Практика</option>
                <option value="siw">СӨЖ</option>
                <option value="syllabus">Силлабус</option>
              </select>
            </div>

            <div class="control-select-card">
              <label for="topicSelect">Тақырып</label>
              <select id="topicSelect">
                <option value="">Тақырыпты таңдаңыз</option>
              </select>
            </div>

            <div class="control-actions-row">
              <button class="action-btn primary" id="openMaterialBtn" type="button">Материал</button>
              <button class="action-btn" id="generateTestBtn" type="button" disabled>Тест жасау</button>
              <button class="action-btn" id="openQrBtn" type="button" disabled>Тест (QR)</button>
              <button class="action-btn" id="openResultsBtn" type="button" disabled>Нәтижелер</button>
            </div>
          </div>

          <!-- БІР ПАРАҚТЫҢ ІШІНДЕГІ НЕГІЗГІ КОНТЕНТ АЙМАҒЫ -->
          <div class="subject-content-board">

              <!-- MATERIAL VIEW -->
              <div class="content-view active" id="materialsPane">
                <div class="content-view-head">
                  <div></div>

                  <div class="content-view-actions">
                    <button class="small-btn" id="openMaterialFullscreenBtn" type="button">Толық экран</button>
                  </div>
                </div>

                <div class="material-preview-wrap">
                  <div class="material-preview" id="materialPreview"></div>
                </div>
              </div>

              <!-- TEST VIEW -->
              <div class="content-view hidden" id="testPane">
                <div class="content-view-head compact-test-head">
                  <p id="testInfoText" class="test-ready-inline"></p>
                </div>

                <div class="test-qr-board">
                  <div class="test-qr-card">
                    <img
                      id="qrImageInline"
                      alt="QR code"
                      style="display:none;width:240px;height:240px;border-radius:20px;background:#fff;padding:12px;"
                    />

                    <div class="test-qr-actions">
                      <button class="small-btn primary" id="openTestDirectBtn" type="button">Тестті ашу</button>
                      <button class="small-btn" id="showQrBtn" type="button">QR ашу</button>
                    </div>
                  </div>
                </div>
              </div>

              <!-- RESULTS VIEW -->
              <div class="content-view hidden" id="resultsPane">
                <div class="content-view-head">
                  <div>
                  </div>
                </div>

                <div class="results-sheet-wrap">
                  <iframe
                    id="resultsSheetFrame"
                    title="Test results sheet"
                    src=""
                    style="width:100%;min-height:720px;border:0;border-radius:24px;background:#fff;"
                  ></iframe>
                </div>
              </div>

          </div>
        </section>
      </section>
    </main>

    <div class="voice-assistant">
      <div class="voice-panel" id="voicePanel">
        <div class="voice-top">
          <button class="voice-close" id="closeVoiceBtn" type="button">×</button>
        </div>

        <div class="voice-core-wrap">
          <div class="voice-rings">
            <div class="ring r1"></div>
            <div class="ring r2"></div>
            <div class="ring r3"></div>
            <div class="voice-core" id="voiceCore" title="Түртіп тыңдауды бастау"></div>
          </div>

          <div class="voice-bars">
            <span></span><span></span><span></span><span></span><span></span>
          </div>

          <div class="voice-status" id="voiceStatus">Дайын</div>
        </div>
      </div>

      <button class="voice-dock" id="openVoiceBtn" type="button" aria-label="AI assistant">
        <svg viewBox="0 0 24 24">
          <path d="M5 14V10"></path>
          <path d="M9 18V6"></path>
          <path d="M13 20V4"></path>
          <path d="M17 17V7"></path>
          <path d="M21 13V11"></path>
        </svg>
      </button>
    </div>

    <div class="modal-backdrop" id="profileModal">
      <div class="profile-modal-box">
        <div class="profile-modal-top">
          <h3>Профильді өңдеу</h3>
          <button class="profile-modal-close" data-close-modal="profileModal" type="button">×</button>
        </div>

        <div class="profile-modal-head">
          <div class="avatar-edit" id="avatarEditPreview">КЕ</div>

          <div class="profile-head-copy">
            <h4 id="profileModalNameText">Каламан Ерболат Тлеуханұлы</h4>
            <p id="profileModalRoleText">ст.преподаватель</p>
          </div>
        </div>

        <input class="hidden-file" id="avatarFileInput" type="file" accept="image/*" />

        <div class="edit-grid">
          <div class="edit-field">
            <label for="profileUsernameInput">Username</label>
            <input id="profileUsernameInput" type="text" value="kalaman_erbolat" />
          </div>

          <div class="edit-field">
            <label for="profileEmailInput">Email</label>
            <input id="profileEmailInput" type="text" readonly />
          </div>

          <div class="edit-field">
            <label for="profileBioInput">Био</label>
            <textarea id="profileBioInput">Ақпараттық қауіпсіздік және бағдарламалау пәндері бойынша оқытушы.</textarea>
          </div>
        </div>

        <div class="profile-modal-actions">
          <button class="save-btn" id="saveProfileBtn" type="button">Сақтау</button>
        </div>
      </div>
    </div>

    <div class="modal-backdrop" id="testModal">
      <div class="modal-box large">
        <div class="modal-top">
          <h3 id="testModalTitle">Тест</h3>
          <button class="modal-close" data-close-modal="testModal" type="button">×</button>
        </div>

        <div class="test-bottom-actions" style="margin-bottom:16px;">
          <button class="small-btn" id="editTestBtn" type="button">Өңдеу</button>
          <button class="small-btn primary hidden" id="saveTestBtn" type="button">Сақтау</button>
        </div>

        <div class="question-edit-list" id="testQuestionsContainer"></div>
      </div>
    </div>

    <div class="modal-backdrop" id="qrModal">
      <div class="modal-box" style="max-width:420px;">
        <div class="modal-top">
          <h3>QR арқылы қосылу</h3>
          <button class="modal-close" data-close-modal="qrModal" type="button">×</button>
        </div>

        <div style="display:grid;justify-items:center;gap:14px;">
          <img id="qrImageInline" alt="QR code" style="display:none;width:240px;height:240px;border-radius:20px;background:#fff;padding:12px;"/>
          <div class="pill open" id="qrCodeLabel">Тестке қосылу</div>
        </div>
      </div>
    </div>

    <div class="modal-backdrop" id="playerDetailModal">
      <div class="modal-box large">
        <div class="modal-top">
          <h3 id="playerDetailTitle">Қатысушы</h3>
          <button class="modal-close" data-close-modal="playerDetailModal" type="button">×</button>
        </div>

        <div class="player-detail-meta" id="playerDetailMeta"></div>
        <div class="player-answer-list" id="playerAnswerList"></div>
      </div>
    </div>
  </div>

  <script src="./js/app.js"></script>
</body>
</html>
